<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1612"/>
      <stop offset="1" stop-color="#14110E"/>
    </linearGradient>
    <linearGradient id="amberCardHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8A858" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#B98432" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C20"/>
      <stop offset="1" stop-color="#2A1F18"/>
    </linearGradient>
    <linearGradient id="caskFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B98432"/>
      <stop offset="1" stop-color="#8B4A2B"/>
    </linearGradient>
    <linearGradient id="caskOld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A2E1A"/>
      <stop offset="1" stop-color="#3A1F12"/>
    </linearGradient>
    <linearGradient id="caskYoung" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8A858"/>
      <stop offset="1" stop-color="#B98432"/>
    </linearGradient>
    <filter id="ds" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="120" y="92" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#F4E9D5" letter-spacing="-0.5">The youngest-cask rule</text>
  <text x="120" y="138" font-family="Inter, sans-serif" font-size="24" fill="#8B9B82">EC Regulation 110/2008, Art 12(3) — incorporated in UK SWR 2009. Any age statement must reflect only the blend's youngest component. Mentioning older casks elsewhere on the bottle or in marketing is restricted.</text>

  <!-- Stage labels -->
  <text x="320" y="220" font-family="Inter, sans-serif" font-size="22" fill="#8B9B82" letter-spacing="2" text-anchor="middle">STAGE 1</text>
  <text x="320" y="252" font-family="Inter, sans-serif" font-size="26" fill="#F4E9D5" font-weight="700" text-anchor="middle">A blend of casks</text>

  <text x="960" y="220" font-family="Inter, sans-serif" font-size="22" fill="#8B9B82" letter-spacing="2" text-anchor="middle">STAGE 2</text>
  <text x="960" y="252" font-family="Inter, sans-serif" font-size="26" fill="#F4E9D5" font-weight="700" text-anchor="middle">What the regulation lets the blender say</text>

  <text x="1600" y="220" font-family="Inter, sans-serif" font-size="22" fill="#8B9B82" letter-spacing="2" text-anchor="middle">STAGE 3</text>
  <text x="1600" y="252" font-family="Inter, sans-serif" font-size="26" fill="#F4E9D5" font-weight="700" text-anchor="middle">Glaser's workaround</text>

  <!-- LEFT: 5 casks of different ages -->
  <g>
    <!-- 30y cask -->
    <ellipse cx="180" cy="370" rx="60" ry="14" fill="url(#caskOld)"/>
    <rect x="120" y="370" width="120" height="100" fill="url(#caskOld)" stroke="#8B4A2B" stroke-width="2"/>
    <ellipse cx="180" cy="470" rx="60" ry="14" fill="#3A1F12"/>
    <text x="180" y="425" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#F4E9D5" text-anchor="middle">30y</text>

    <!-- 22y cask -->
    <ellipse cx="320" cy="370" rx="60" ry="14" fill="url(#caskOld)"/>
    <rect x="260" y="370" width="120" height="100" fill="url(#caskOld)" stroke="#8B4A2B" stroke-width="2"/>
    <ellipse cx="320" cy="470" rx="60" ry="14" fill="#3A1F12"/>
    <text x="320" y="425" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#F4E9D5" text-anchor="middle">22y</text>

    <!-- 18y cask -->
    <ellipse cx="460" cy="370" rx="60" ry="14" fill="url(#caskFill)"/>
    <rect x="400" y="370" width="120" height="100" fill="url(#caskFill)" stroke="#B98432" stroke-width="2"/>
    <ellipse cx="460" cy="470" rx="60" ry="14" fill="#8B4A2B"/>
    <text x="460" y="425" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#14110E" text-anchor="middle">18y</text>

    <!-- 15y cask -->
    <ellipse cx="180" cy="540" rx="60" ry="14" fill="url(#caskFill)"/>
    <rect x="120" y="540" width="120" height="100" fill="url(#caskFill)" stroke="#B98432" stroke-width="2"/>
    <ellipse cx="180" cy="640" rx="60" ry="14" fill="#8B4A2B"/>
    <text x="180" y="595" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#14110E" text-anchor="middle">15y</text>

    <!-- 12y cask (highlighted, the youngest) -->
    <ellipse cx="320" cy="540" rx="60" ry="14" fill="url(#caskYoung)"/>
    <rect x="260" y="540" width="120" height="100" fill="url(#caskYoung)" stroke="#D8A858" stroke-width="3"/>
    <ellipse cx="320" cy="640" rx="60" ry="14" fill="#B98432"/>
    <text x="320" y="595" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#14110E" text-anchor="middle">12y</text>
    <text x="320" y="690" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#D8A858" text-anchor="middle" letter-spacing="2">YOUNGEST</text>
  </g>

  <!-- Arrow to middle -->
  <path d="M 580 520 L 700 520" stroke="#D8A858" stroke-width="3" fill="none" marker-end="url(#arrowM)"/>
  <defs>
    <marker id="arrowM" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#D8A858"/>
    </marker>
  </defs>

  <!-- MIDDLE: What the bottle can say -->
  <rect x="730" y="290" width="460" height="500" rx="14" fill="url(#darkCard)" stroke="#4A6B4F" stroke-width="2" filter="url(#ds)"/>

  <!-- Allowed -->
  <text x="960" y="340" font-family="Inter, sans-serif" font-size="20" fill="#7AA084" font-weight="700" text-anchor="middle" letter-spacing="2">ALLOWED ON THE LABEL</text>
  <rect x="780" y="368" width="360" height="56" rx="8" fill="rgba(122,160,132,0.18)" stroke="#7AA084" stroke-width="1"/>
  <text x="960" y="406" font-family="Georgia, serif" font-size="32" fill="#F4E9D5" font-weight="700" text-anchor="middle">"12 years old"</text>

  <line x1="780" y1="478" x2="1140" y2="478" stroke="#4A6B4F" stroke-width="1" opacity="0.4"/>

  <!-- Restricted -->
  <text x="960" y="528" font-family="Inter, sans-serif" font-size="20" fill="#C77A4F" font-weight="700" text-anchor="middle" letter-spacing="2">RESTRICTED ELSEWHERE</text>

  <text x="960" y="576" font-family="Inter, sans-serif" font-size="22" fill="#F4E9D5" text-anchor="middle">"Includes 30-year-old casks"</text>
  <text x="960" y="612" font-family="Inter, sans-serif" font-size="22" fill="#F4E9D5" text-anchor="middle">"Built around a 22-year heart"</text>
  <text x="960" y="648" font-family="Inter, sans-serif" font-size="22" fill="#F4E9D5" text-anchor="middle">"Composition: 12y 50%, 30y 7%..."</text>

  <text x="960" y="700" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="middle">Marketing material that mentions older</text>
  <text x="960" y="726" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="middle">component ages can be read as an</text>
  <text x="960" y="752" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="middle">implied age claim, even off the label.</text>

  <!-- Arrow to right -->
  <path d="M 1220 520 L 1340 520" stroke="#D8A858" stroke-width="3" fill="none" marker-end="url(#arrowM)"/>

  <!-- RIGHT: Compass Box workaround -->
  <rect x="1370" y="290" width="460" height="500" rx="14" fill="url(#amberCardHL)" stroke="#D8A858" stroke-width="3" filter="url(#ds)"/>

  <text x="1600" y="340" font-family="Inter, sans-serif" font-size="20" fill="#D8A858" font-weight="700" text-anchor="middle" letter-spacing="2">PUBLISHED ON THE WEBSITE</text>
  <text x="1600" y="378" font-family="Inter, sans-serif" font-size="22" fill="#8B9B82" text-anchor="middle">factsheet · downloadable PDF</text>

  <line x1="1410" y1="408" x2="1790" y2="408" stroke="#D8A858" stroke-width="1" opacity="0.4"/>

  <text x="1410" y="456" font-family="Inter, sans-serif" font-size="22" fill="#F4E9D5" font-weight="700">Component breakdown</text>

  <!-- Faux ledger lines -->
  <g font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5">
    <text x="1410" y="498">Highland Park 22y</text>
    <text x="1790" y="498" text-anchor="end" fill="#D8A858" font-weight="700">7.0%</text>

    <text x="1410" y="534">Caol Ila 30y</text>
    <text x="1790" y="534" text-anchor="end" fill="#D8A858" font-weight="700">4.5%</text>

    <text x="1410" y="570">Clynelish 30y</text>
    <text x="1790" y="570" text-anchor="end" fill="#D8A858" font-weight="700">3.0%</text>

    <text x="1410" y="606">Glen Elgin 9y</text>
    <text x="1790" y="606" text-anchor="end" fill="#D8A858" font-weight="700">17.0%</text>

    <text x="1410" y="642" fill="#8B9B82">cask types, char levels,</text>
    <text x="1410" y="668" fill="#8B9B82">first-fill / refill ratio…</text>
  </g>

  <line x1="1410" y1="700" x2="1790" y2="700" stroke="#D8A858" stroke-width="1" opacity="0.4"/>

  <text x="1410" y="744" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" font-weight="700">Same information.</text>
  <text x="1410" y="772" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82">Different surface. SWR is not broken.</text>

  <!-- Footer -->
  <line x1="120" y1="900" x2="1800" y2="900" stroke="#4A6B4F" stroke-width="1" opacity="0.4"/>
  <text x="120" y="950" font-family="Inter, sans-serif" font-size="24" fill="#F4E9D5" font-weight="600">
    The bottle's "youngest-only" floor was kept. The ceiling moved to a PDF the consumer has to seek out.
  </text>
  <text x="120" y="984" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82">
    Glaser's 2016 campaign asked for an optional disclosure clause. The SWA declined; the workaround stayed.
  </text>
  <text x="120" y="1018" font-family="Inter, sans-serif" font-size="18" fill="#5C6F5F">
    legacydram.com — Compass Box · SWR 2009 Reg 12 · EC 110/2008 Art 12.3
  </text>
</svg>
