<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1612"/>
      <stop offset="1" stop-color="#14110E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="120" y="90" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#F4E9D5" letter-spacing="-0.5">
    Speyside 1840–1880: four design choices, three taken
  </text>
  <text x="120" y="132" font-family="Inter, sans-serif" font-size="26" fill="#B98432">
    Where each distillery&apos;s founding engineer placed their bet on the reflux ratio
  </text>

  <!-- Quadrant frame -->
  <rect x="300" y="220" width="1340" height="720" fill="none" stroke="#4A6B4F" stroke-width="2"/>

  <!-- Cross axes -->
  <line x1="970" y1="220" x2="970" y2="940" stroke="#4A6B4F" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="300" y1="580" x2="1640" y2="580" stroke="#4A6B4F" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- Axis labels -->
  <!-- Horizontal axis: heavy spirit  →  light spirit -->
  <text x="500" y="200" font-family="Inter, sans-serif" font-size="28" fill="#8B9B82" text-anchor="middle" font-weight="600">heavy, oily, sulfury</text>
  <text x="500" y="232" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="middle">low reflux ratio</text>
  <text x="1440" y="200" font-family="Inter, sans-serif" font-size="28" fill="#D8A858" text-anchor="middle" font-weight="600">light, floral, ester-led</text>
  <text x="1440" y="232" font-family="Inter, sans-serif" font-size="20" fill="#D8A858" text-anchor="middle">high reflux ratio</text>

  <!-- Vertical axis: architectural top, retrofit bottom -->
  <text x="270" y="350" font-family="Inter, sans-serif" font-size="26" fill="#F4E9D5" text-anchor="end" font-weight="600">architectural</text>
  <text x="270" y="378" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="end">decided at founding,</text>
  <text x="270" y="402" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="end">in the still geometry itself</text>

  <text x="270" y="780" font-family="Inter, sans-serif" font-size="26" fill="#F4E9D5" text-anchor="end" font-weight="600">retrofit / patch</text>
  <text x="270" y="808" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="end">bolted on later, on top</text>
  <text x="270" y="832" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="end">of existing geometry</text>

  <!-- Upper-left: Cragganmore 1869 (heavy, architectural) -->
  <circle cx="600" cy="420" r="22" fill="#8B4A2B" stroke="#B98432" stroke-width="3"/>
  <text x="600" y="380" font-family="Georgia, serif" font-size="38" fill="#F4E9D5" text-anchor="middle" font-weight="700">Cragganmore</text>
  <text x="600" y="468" font-family="Inter, sans-serif" font-size="24" fill="#B98432" text-anchor="middle">John Smith, 1869</text>
  <text x="600" y="498" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">short stills + T-shape lyne arms</text>
  <text x="600" y="524" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">+ outdoor worm tubs</text>

  <!-- Upper-right: Glenmorangie 1843 (light, architectural) -->
  <circle cx="1340" cy="380" r="22" fill="#8B4A2B" stroke="#B98432" stroke-width="3"/>
  <text x="1340" y="340" font-family="Georgia, serif" font-size="38" fill="#F4E9D5" text-anchor="middle" font-weight="700">Glenmorangie</text>
  <text x="1340" y="428" font-family="Inter, sans-serif" font-size="24" fill="#B98432" text-anchor="middle">William Matheson, 1843</text>
  <text x="1340" y="458" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">5.14 m tall gin stills</text>
  <text x="1340" y="484" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">+ upward-angled lyne arms</text>

  <!-- Lower-left: empty (no retrofit-into-heavy story) -->
  <text x="600" y="740" font-family="Inter, sans-serif" font-size="22" fill="#5C4A3A" text-anchor="middle" font-style="italic">empty quadrant</text>
  <text x="600" y="770" font-family="Inter, sans-serif" font-size="18" fill="#5C4A3A" text-anchor="middle">no well-known distillery</text>
  <text x="600" y="794" font-family="Inter, sans-serif" font-size="18" fill="#5C4A3A" text-anchor="middle">retrofits its way into a heavy</text>
  <text x="600" y="818" font-family="Inter, sans-serif" font-size="18" fill="#5C4A3A" text-anchor="middle">spirit — removing copper</text>
  <text x="600" y="842" font-family="Inter, sans-serif" font-size="18" fill="#5C4A3A" text-anchor="middle">contact after the fact rarely pays</text>

  <!-- Lower-right: Glen Grant 1872 (light, retrofit) - HIGHLIGHTED -->
  <circle cx="1340" cy="780" r="28" fill="#B98432" stroke="#D8A858" stroke-width="4"/>
  <text x="1340" y="730" font-family="Georgia, serif" font-size="44" fill="#F4E9D5" text-anchor="middle" font-weight="700">Glen Grant</text>
  <text x="1340" y="838" font-family="Inter, sans-serif" font-size="26" fill="#D8A858" text-anchor="middle" font-weight="600">Major James Grant, 1872</text>
  <text x="1340" y="870" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">existing stills kept;</text>
  <text x="1340" y="896" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">water-cooled purifier</text>
  <text x="1340" y="922" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5" text-anchor="middle">bolted to each lyne arm</text>

  <!-- Footer reading -->
  <text x="120" y="1010" font-family="Inter, sans-serif" font-size="22" fill="#8B9B82" font-weight="600">Reading:</text>
  <text x="120" y="1042" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5">
    same Speyside river, same three decades, three engineers solving for different markets. The two paths to a light spirit
  </text>
  <text x="120" y="1068" font-family="Inter, sans-serif" font-size="20" fill="#F4E9D5">
    (Glenmorangie vs Glen Grant) are commercially comparable but architecturally opposite — one in the foundation, one in a patch.
  </text>
</svg>
