<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1612"/>
      <stop offset="1" stop-color="#14110E"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8A858"/>
      <stop offset="0.4" stop-color="#B98432"/>
      <stop offset="1" stop-color="#6B3820"/>
    </linearGradient>
    <linearGradient id="copperShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6B3820"/>
      <stop offset="0.4" stop-color="#B98432"/>
      <stop offset="0.6" stop-color="#D8A858"/>
      <stop offset="1" stop-color="#8B4A2B"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D5566"/>
      <stop offset="1" stop-color="#1F2D3A"/>
    </linearGradient>
    <linearGradient id="soundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F2D3A" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#1F2D3A" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Sound of Islay silhouette in background (top right): Paps of Jura -->
  <g opacity="0.55">
    <path d="M 1280 250 L 1380 90 L 1460 200 L 1540 60 L 1620 180 L 1700 110 L 1800 230 L 1900 200 L 1900 320 L 1280 320 Z" fill="url(#soundGrad)"/>
    <text x="1900" y="350" font-family="Inter, sans-serif" font-size="18" fill="#8B9B82" text-anchor="end">the Paps of Jura, seen through the still-room windows above Port Askaig</text>
  </g>

  <!-- Title -->
  <text x="120" y="92" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#F4E9D5" letter-spacing="-0.5">
    Caol Ila's clean-spirit stillhouse
  </text>
  <text x="120" y="138" font-family="Inter, sans-serif" font-size="28" fill="#B98432">
    3 wash + 3 spirit stills, shell-and-tube condensers (no worm tubs), 35 ppm phenol in, restrained smoke out
  </text>

  <!-- Stillhouse wall divider -->
  <line x1="120" y1="780" x2="1800" y2="780" stroke="#4A6B4F" stroke-width="2" stroke-dasharray="8,8" opacity="0.6"/>
  <text x="1800" y="772" font-family="Inter, sans-serif" font-size="18" fill="#8B9B82" text-anchor="end">stillhouse floor (condensers and tail boxes below)</text>

  <!-- WASH STILLS (left side, 3 stills, larger) -->
  <text x="120" y="220" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#F4E9D5">3 Wash Stills</text>
  <text x="120" y="252" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82">~35,000 L each · descending lyne arms · among the largest on Islay</text>

  <!-- Wash still 1 -->
  <g transform="translate(120, 320)">
    <ellipse cx="120" cy="370" rx="110" ry="48" fill="url(#copperGrad)" filter="url(#softShadow)"/>
    <path d="M 12 370 Q 12 240 60 195 L 180 195 Q 230 240 230 370 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <!-- Neck -->
    <path d="M 60 195 L 78 130 L 78 50 L 162 50 L 162 130 L 180 195 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <!-- Descending lyne arm -->
    <path d="M 162 70 L 320 70 L 340 130 L 358 130 L 358 90 L 162 90 Z" fill="url(#copperShine)"/>
    <!-- Heat source (steam coils, not coal) -->
    <rect x="70" y="425" width="100" height="14" fill="#4A6B4F" rx="3"/>
  </g>

  <!-- Wash still 2 -->
  <g transform="translate(420, 320)" opacity="0.92">
    <ellipse cx="120" cy="370" rx="110" ry="48" fill="url(#copperGrad)" filter="url(#softShadow)"/>
    <path d="M 12 370 Q 12 240 60 195 L 180 195 Q 230 240 230 370 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 60 195 L 78 130 L 78 50 L 162 50 L 162 130 L 180 195 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 162 70 L 320 70 L 340 130 L 358 130 L 358 90 L 162 90 Z" fill="url(#copperShine)"/>
    <rect x="70" y="425" width="100" height="14" fill="#4A6B4F" rx="3"/>
  </g>

  <!-- Wash still 3 -->
  <g transform="translate(720, 320)" opacity="0.84">
    <ellipse cx="120" cy="370" rx="110" ry="48" fill="url(#copperGrad)" filter="url(#softShadow)"/>
    <path d="M 12 370 Q 12 240 60 195 L 180 195 Q 230 240 230 370 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 60 195 L 78 130 L 78 50 L 162 50 L 162 130 L 180 195 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 162 70 L 320 70 L 340 130 L 358 130 L 358 90 L 162 90 Z" fill="url(#copperShine)"/>
    <rect x="70" y="425" width="100" height="14" fill="#4A6B4F" rx="3"/>
  </g>

  <!-- SPIRIT STILLS (right side, 3 stills, smaller) -->
  <text x="1180" y="220" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#F4E9D5">3 Spirit Stills</text>
  <text x="1180" y="252" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82">~12,000 L each · straight lyne arms · cleaner cut, restrained smoke</text>

  <!-- Spirit still 1 -->
  <g transform="translate(1180, 420)">
    <ellipse cx="80" cy="270" rx="80" ry="36" fill="url(#copperGrad)" filter="url(#softShadow)"/>
    <path d="M 0 270 Q 0 170 40 140 L 120 140 Q 160 170 160 270 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 40 140 L 52 90 L 52 30 L 108 30 L 108 90 L 120 140 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <!-- Straight lyne arm -->
    <path d="M 108 50 L 240 50 L 240 70 L 108 70 Z" fill="url(#copperShine)"/>
    <rect x="40" y="312" width="80" height="12" fill="#4A6B4F" rx="3"/>
  </g>

  <!-- Spirit still 2 -->
  <g transform="translate(1400, 420)" opacity="0.92">
    <ellipse cx="80" cy="270" rx="80" ry="36" fill="url(#copperGrad)" filter="url(#softShadow)"/>
    <path d="M 0 270 Q 0 170 40 140 L 120 140 Q 160 170 160 270 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 40 140 L 52 90 L 52 30 L 108 30 L 108 90 L 120 140 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 108 50 L 240 50 L 240 70 L 108 70 Z" fill="url(#copperShine)"/>
    <rect x="40" y="312" width="80" height="12" fill="#4A6B4F" rx="3"/>
  </g>

  <!-- Spirit still 3 -->
  <g transform="translate(1620, 420)" opacity="0.84">
    <ellipse cx="80" cy="270" rx="80" ry="36" fill="url(#copperGrad)" filter="url(#softShadow)"/>
    <path d="M 0 270 Q 0 170 40 140 L 120 140 Q 160 170 160 270 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 40 140 L 52 90 L 52 30 L 108 30 L 108 90 L 120 140 Z" fill="url(#copperShine)" filter="url(#softShadow)"/>
    <path d="M 108 50 L 240 50 L 240 70 L 108 70 Z" fill="url(#copperShine)"/>
    <rect x="40" y="312" width="80" height="12" fill="#4A6B4F" rx="3"/>
  </g>

  <!-- SHELL-AND-TUBE CONDENSERS (bottom row, NOT worm tubs) -->
  <text x="120" y="850" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#F4E9D5">6 Shell-and-Tube Condensers</text>
  <text x="120" y="882" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82">Dense copper-tube bundles inside cooled jackets · high copper surface area · sulfur compounds scrubbed off the new make</text>

  <!-- Condenser 1 -->
  <g transform="translate(180, 910)">
    <rect width="180" height="90" fill="url(#waterGrad)" rx="8" filter="url(#softShadow)"/>
    <line x1="15" y1="20" x2="165" y2="20" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="35" x2="165" y2="35" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="50" x2="165" y2="50" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="65" x2="165" y2="65" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="80" x2="165" y2="80" stroke="#B98432" stroke-width="2" opacity="0.85"/>
  </g>
  <g transform="translate(480, 910)">
    <rect width="180" height="90" fill="url(#waterGrad)" rx="8" filter="url(#softShadow)"/>
    <line x1="15" y1="20" x2="165" y2="20" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="35" x2="165" y2="35" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="50" x2="165" y2="50" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="65" x2="165" y2="65" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="80" x2="165" y2="80" stroke="#B98432" stroke-width="2" opacity="0.85"/>
  </g>
  <g transform="translate(780, 910)">
    <rect width="180" height="90" fill="url(#waterGrad)" rx="8" filter="url(#softShadow)"/>
    <line x1="15" y1="20" x2="165" y2="20" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="35" x2="165" y2="35" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="50" x2="165" y2="50" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="65" x2="165" y2="65" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="80" x2="165" y2="80" stroke="#B98432" stroke-width="2" opacity="0.85"/>
  </g>
  <g transform="translate(1180, 910)">
    <rect width="160" height="90" fill="url(#waterGrad)" rx="8" filter="url(#softShadow)"/>
    <line x1="15" y1="20" x2="145" y2="20" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="35" x2="145" y2="35" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="50" x2="145" y2="50" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="65" x2="145" y2="65" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="80" x2="145" y2="80" stroke="#B98432" stroke-width="2" opacity="0.85"/>
  </g>
  <g transform="translate(1400, 910)">
    <rect width="160" height="90" fill="url(#waterGrad)" rx="8" filter="url(#softShadow)"/>
    <line x1="15" y1="20" x2="145" y2="20" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="35" x2="145" y2="35" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="50" x2="145" y2="50" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="65" x2="145" y2="65" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="80" x2="145" y2="80" stroke="#B98432" stroke-width="2" opacity="0.85"/>
  </g>
  <g transform="translate(1620, 910)">
    <rect width="160" height="90" fill="url(#waterGrad)" rx="8" filter="url(#softShadow)"/>
    <line x1="15" y1="20" x2="145" y2="20" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="35" x2="145" y2="35" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="50" x2="145" y2="50" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="65" x2="145" y2="65" stroke="#B98432" stroke-width="2" opacity="0.85"/>
    <line x1="15" y1="80" x2="145" y2="80" stroke="#B98432" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- Footer caption -->
  <text x="960" y="1050" font-family="Inter, sans-serif" font-size="20" fill="#8B9B82" text-anchor="middle" font-style="italic">large stills + shell-and-tube + short residence time → heavy peat goes in, restrained citric smoke comes out (this is what the 1972 rebuild was for)</text>
</svg>
