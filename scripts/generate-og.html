<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', system-ui, sans-serif;
    background: #14110E;
    color: #E8DEC8;
    overflow: hidden;
    position: relative;
  }
  .gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 400px at 80% 30%, rgba(185, 132, 50, 0.35), transparent 60%),
      radial-gradient(ellipse 600px 500px at 20% 80%, rgba(139, 74, 43, 0.30), transparent 65%),
      linear-gradient(135deg, #14110E 0%, #1F1A14 100%);
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(232, 222, 200, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232, 222, 200, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .container {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .brand {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #D4A86A;
    margin-bottom: 42px;
    text-transform: uppercase;
  }
  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 76px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.01em;
    color: #E8DEC8;
    margin-bottom: 28px;
    max-width: 900px;
  }
  .title em {
    font-style: italic;
    font-weight: 600;
    color: #D4A86A;
  }
  .tagline {
    font-size: 22px;
    line-height: 1.5;
    color: #C2B392;
    max-width: 800px;
    font-weight: 400;
  }
  .footer {
    position: absolute;
    bottom: 80px;
    left: 100px;
    right: 100px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    color: #9B8868;
    font-size: 18px;
    letter-spacing: 0.05em;
  }
  .url { font-weight: 500; }
  .by { font-style: italic; }
  .accent-line {
    position: absolute;
    top: 120px;
    left: 100px;
    width: 60px;
    height: 3px;
    background: #B98432;
  }
</style>
</head>
<body>
  <div class="gradient"></div>
  <div class="grid"></div>
  <div class="container">
    <div class="accent-line"></div>
    <div class="brand">LegacyDram</div>
    <div class="title">Whisky, told through<br />the people who <em>made</em> it.</div>
    <div class="tagline">A curated whisky media for engineers.<br />People-first biographies, craft chemistry, tasting picks with reasoning.</div>
  </div>
  <div class="footer">
    <span class="url">legacydram.com</span>
    <span class="by">— by Ken Imoto</span>
  </div>
</body>
</html>
